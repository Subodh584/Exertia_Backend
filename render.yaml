# render.yaml – Render Blueprint (Infrastructure as Code)
# https://docs.render.com/blueprint-spec

services:
  - type: web
    name: exertia-backend
    runtime: python
    region: oregon
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: exertia-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://your-frontend-domain.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://your-frontend-domain.com"
      - key: PYTHON_VERSION
        value: "3.13.7"

databases:
  - name: exertia-db
    plan: free
    region: oregon
